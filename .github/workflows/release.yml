name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [ -n "$(git log -1 --since='24 hours ago' --format='%h')" ]; then
              echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e
          else
            npm run test:e2e
          fi

      - name: Build and Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
