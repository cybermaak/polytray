name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup and Test
        uses: ./.github/actions/setup-and-test

      - name: Build JS sources
        run: npm run build

      - name: Package Application
        run: npx electron-builder --publish never

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polytray-${{ runner.os }}-artifacts
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.snap
          retention-days: 7

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.snap
            dist/*.blockmap
            latest*.yml
