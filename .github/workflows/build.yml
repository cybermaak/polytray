name: Daily Build

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [ -n "$(git log -1 --since='24 hours ago' --format='%h')" ]; then
              echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup and Test
        uses: ./.github/actions/setup-and-test

      - name: Build JS sources
        run: npm run build

      - name: Package Application
        run: npx electron-builder --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polytray-${{ runner.os }}-artifacts
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.snap
          retention-days: 7
