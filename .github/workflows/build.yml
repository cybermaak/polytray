name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup and Test
        uses: ./.github/actions/setup-and-test

      - name: Package App
        uses: ./.github/actions/package-app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polytray-${{ runner.os }}-artifacts
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*-mac.zip
            dist/*.AppImage
            dist/*.blockmap
            latest*.yml
          retention-days: 7
