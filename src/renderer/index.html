<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polytray — 3D File Organizer</title>
    <meta
      name="description"
      content="Local 3D file organizer for scanning, indexing, and previewing .obj, .stl, .3mf files"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <!-- Titlebar drag area (macOS) -->
      <div id="titlebar">
        <span class="titlebar-text">Polytray</span>
      </div>

      <div id="main-layout">
        <!-- Sidebar -->
        <aside id="sidebar">
          <div class="sidebar-section">
            <button id="btn-select-folder" class="btn-primary">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path
                  d="M2 3.5A1.5 1.5 0 013.5 2h2.879a1.5 1.5 0 011.06.44l.622.62a1.5 1.5 0 001.06.44H12.5A1.5 1.5 0 0114 5v7.5a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 12.5v-9z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  fill="none"
                />
              </svg>
              Add Folder
            </button>
            <ul id="library-folders" class="library-folders">
              <!-- Populated dynamically -->
            </ul>
          </div>

          <div class="sidebar-section sidebar-stats">
            <h3>Library</h3>
            <div class="stat-grid">
              <div class="stat-item">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Total</span>
              </div>
              <div class="stat-item stat-stl">
                <span class="stat-value" id="stat-stl">0</span>
                <span class="stat-label">STL</span>
              </div>
              <div class="stat-item stat-obj">
                <span class="stat-value" id="stat-obj">0</span>
                <span class="stat-label">OBJ</span>
              </div>
              <div class="stat-item stat-3mf">
                <span class="stat-value" id="stat-3mf">0</span>
                <span class="stat-label">3MF</span>
              </div>
            </div>
            <div class="stat-size"><span id="stat-size">0 B</span> total</div>
          </div>

          <div class="sidebar-section">
            <h3>Format Filter</h3>
            <div class="filter-buttons">
              <button class="filter-btn active" data-ext="">All</button>
              <button class="filter-btn" data-ext="stl">STL</button>
              <button class="filter-btn" data-ext="obj">OBJ</button>
              <button class="filter-btn" data-ext="3mf">3MF</button>
            </div>
          </div>
        </aside>

        <!-- Main Content -->
        <main id="content">
          <!-- Toolbar -->
          <div id="toolbar">
            <div class="search-wrapper">
              <svg
                class="search-icon"
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
              >
                <circle
                  cx="6.5"
                  cy="6.5"
                  r="5"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <path
                  d="M10.5 10.5L15 15"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
              <input
                type="text"
                id="search-input"
                placeholder="Search files..."
                autocomplete="off"
              />
              <button id="search-clear" class="search-clear hidden">×</button>
            </div>

            <div class="toolbar-controls">
              <button id="btn-theme-toggle" class="btn-icon" title="Toggle Light/Dark Mode">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M8 12a4 4 0 100-8 4 4 0 000 8zM8 2V1M8 15v-1M2 8H1M15 8h-1M3.75 3.75L3 3M13 13l-.75-.75M3.75 12.25L3 13M13 3l-.75.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <select id="sort-select">
                <option value="name">Name</option>
                <option value="size">Size</option>
                <option value="date">Date</option>
                <option value="vertices">Vertices</option>
                <option value="faces">Faces</option>
              </select>
              <button
                id="sort-order"
                class="btn-icon"
                title="Toggle sort order"
              >
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path
                    d="M4 6l4-4 4 4M4 10l4 4 4-4"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
              <button id="btn-rescan" class="btn-icon" title="Rescan folder">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path
                    d="M13.5 8a5.5 5.5 0 01-9.23 4.05M2.5 8a5.5 5.5 0 019.23-4.05"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                  <path
                    d="M13.5 3v5h-5M2.5 13V8h5"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- File Grid -->
          <div id="file-grid" class="file-grid">
            <!-- File cards rendered here -->
          </div>

          <!-- Empty State -->
          <div id="empty-state" class="empty-state">
            <div class="empty-icon">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <path
                  d="M8 16a8 8 0 018-8h11.51a8 8 0 015.657 2.343l2.49 2.49A8 8 0 0041.314 15H48a8 8 0 018 8v25a8 8 0 01-8 8H16a8 8 0 01-8-8V16z"
                  stroke="currentColor"
                  stroke-width="2"
                  opacity="0.3"
                />
                <path
                  d="M24 36h16M32 28v16"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  opacity="0.3"
                />
              </svg>
            </div>
            <h2>No 3D files found</h2>
            <p>Select a folder to scan for .obj, .stl, and .3mf files</p>
          </div>

          <!-- Scan Progress -->
          <div id="scan-progress" class="scan-progress hidden">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text">
              <span id="progress-text">Scanning...</span>
              <span id="progress-count">0 / 0</span>
            </div>
          </div>
        </main>
      
        <!-- 3D Preview Panel -->
        <aside id="preview-panel" class="preview-panel hidden">
        <div class="viewer-header">
          <div class="viewer-title">
            <h2 id="viewer-filename">model.stl</h2>
            <span id="viewer-meta" class="viewer-meta"></span>
          </div>
          <div class="viewer-controls">
            <button
              id="btn-wireframe"
              class="btn-viewer"
              title="Toggle wireframe"
            >
              Wireframe
            </button>
            <button
              id="btn-reset-camera"
              class="btn-viewer"
              title="Reset camera"
            >
              Reset
            </button>
            <button
              id="btn-expand-viewer"
              class="btn-viewer"
              title="Expand/Collapse Viewer"
            >
              Expand
            </button>
            <button
              id="btn-close-viewer"
              class="btn-viewer btn-close"
              title="Close viewer"
            >
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path
                  d="M5 5l10 10M15 5L5 15"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </div>
        <div id="viewer-container" class="viewer-container"></div>
        <div id="viewer-loading" class="viewer-loading hidden">
          <div class="spinner"></div>
          <span>Loading model...</span>
        </div>
      </aside>
    </div>

    <!-- Hidden canvas for thumbnail generation -->
    <canvas
      id="thumbnail-canvas"
      width="256"
      height="256"
      style="display: none"
    ></canvas>

    <script type="module" src="./app.js"></script>
  </body>
</html>
